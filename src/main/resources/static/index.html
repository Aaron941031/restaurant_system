<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐廳推薦與揪團系統</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>餐廳推薦</h1>
        <p>發現美食・揪團用餐</p>
        <div class="session-info" id="session-info">未登入</div>
    </div>

    <div class="content">

        <div id="page-auth" class="page active">
            <div class="title">開始使用</div>

            <div class="auth-section-label">建立帳號</div>
            <form id="register-form">
                <div class="form-group">
                    <label>名稱</label>
                    <input type="text" name="name" placeholder="輸入使用者名稱" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" name="password" placeholder="設定密碼" required>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn-primary">註冊</button>
                </div>
            </form>

            <hr>

            <div class="auth-section-label">已有帳號？登入</div>
            <form id="login-form">
                <div class="form-group">
                    <label>名稱</label>
                    <input type="text" name="name" placeholder="輸入名稱" required>
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" name="password" placeholder="輸入密碼" required>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn-primary">登入</button>
                </div>
            </form>
        </div>

        <div id="page-menu" class="page">
            <div class="title">選單</div>

            <div class="button-group">
                <button class="btn-primary" onclick="goPage('restaurants')">&nbsp;查看餐廳</button>
                <button class="btn-primary" onclick="goPage('recommend')">&nbsp;個人推薦</button>
                <button class="btn-primary" onclick="goPage('rate')">&nbsp;評分</button>
                <button class="btn-primary" onclick="goPage('groups')">&nbsp;揪團</button>
            </div>
            <div class="button-group" style="margin-top: 16px;">
                <button class="btn-secondary" onclick="logout()">登出</button>
            </div>
        </div>

        <div id="page-restaurants" class="page">
            <div class="title">餐廳列表</div>
            <div class="button-group">
                <button type="button" class="btn-back" onclick="goPage('menu')">返回</button>
            </div>
            <div id="restaurants-list" style="margin-top: 28px;"></div>
        </div>

        <div id="page-rate" class="page" style="position: relative;">
            <div class="title">評分餐廳</div>
            <button type="button" id="my-reviews-btn" class="btn-secondary" style="position: absolute; top: 0; right: 0; flex: 0 0 auto; font-size: 13px; padding: 9px 12px;">我的評論</button>
            
            <form id="rating-form">
                <div class="form-group">
                    <label>選擇餐廳</label>
                    <select name="restaurantId" required id="rate-restaurant-select">
                        <option value="">載入中…</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>評分</label>
                    <select name="score" required>
                        <option value="">選擇分數</option>
                        <option value="5">⭐⭐⭐⭐⭐　非常好</option>
                        <option value="4">⭐⭐⭐⭐　很好</option>
                        <option value="3">⭐⭐⭐　普通</option>
                        <option value="2">⭐⭐　不太好</option>
                        <option value="1">⭐　很差</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>評論（選填）</label>
                    <textarea name="comment" placeholder="分享你的感受…"></textarea>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn-primary">送出評分</button>
                    <button type="button" class="btn-back" onclick="goPage('menu')">返回</button>
                </div>
            </form>
        </div>

       <div id="page-recommend" class="page">
           <div class="title" style="margin-bottom:0;">個人推薦</div>
           <div style="display:flex;align-items:center;padding:18px 0;">
               <button type="button" class="btn-back" style="flex:0 0 auto;" onclick="goPage('menu')">返回</button>
           </div>
           <div class="form-group">
               <label>排除設定（選填）</label>
               <div class="exclusion-panel">
                   <div class="form-group">
                       <label>排除種類</label>
                       <select id="exclude-type">
                           <option value="ingredient">食材</option>
                           <option value="dish">菜餚</option>
                           <option value="restaurant">餐廳</option>
                       </select>
                   </div>
                   <div class="form-group">
                       <label id="exclude-items-label">選擇要排除的食材</label>
                       <input type="text" id="exclude-search" placeholder="輸入以搜尋並按 Enter 選取" autocomplete="off">
                       <div id="exclude-suggestions" class="suggestions hidden"></div>
                       <div id="exclude-selected" class="selected-list"></div>
                       <div style="display: grid; grid-template-columns: 1fr 220px; gap: 8px; margin-top: 8px; align-items:start;">
                           <select id="exclude-items" class="multi-select" multiple size="6"></select>
                           <div style="font-size:12px;color:var(--text-muted);">或使用搜尋加入</div>
                       </div>
                       <div id="exclude-options" style="display:none"></div>
                       <div class="helper-text">可輸入關鍵字搜尋，按 Enter 或點擊建議以加入選取</div>
                   </div>
                   <div class="button-group" style="margin-top: 8px;">
                       <button type="button" class="btn-secondary" onclick="addExclusion()" style="width: 100%;">加入排除項目</button>
                   </div>
                   <div class="button-group" style="margin-top: 8px;">
                       <button type="button" class="btn-secondary" onclick="showExclusions()" style="width: 100%;">顯示已排除項目</button>
                   </div>
               </div>
           </div>

           <div id="exclusion-section" class="hidden" style="margin: 20px 0;">
               <div style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-muted); margin-bottom: 10px;">已排除項目</div>
               <div id="exclusion-display"></div>
           </div>

           <button type="button" class="btn-primary" onclick="getRecommendations()" style="width: 100%; margin-top: 8px;">取得推薦</button>
           <div id="recommend-list" style="margin-top: 20px;"></div>
       </div>

       <div id="page-groups" class="page">
            <div class="title">揪團</div>

            <button type="button" id="btn-show-create-group" class="btn-primary" onclick="showCreateGroupInput()" 
                    style="width: 100%; margin-bottom: 16px;">建立新群組</button>

            <div id="create-group-panel" class="hidden" style="margin-bottom: 16px; padding: 16px; background: var(--surface-raised); border-radius: var(--radius-md); border: 1px solid var(--border);">
                <div class="form-group" style="margin-bottom: 12px;">
                    <label>群組名稱（選填）</label>
                    <input type="text" id="new-group-name" placeholder="輸入群組名稱，或直接按建立">
                </div>
                <div class="button-group" style="margin-top: 0;">
                    <button type="button" class="btn-primary" onclick="submitCreateGroup()">建立</button>
                    <button type="button" class="btn-secondary" onclick="hideCreateGroupInput()">取消</button>
                </div>
            </div>

            <div id="group-display"></div>

            <div style="font-size: 12px; font-weight: 600; text-transform: uppercase; 
                        letter-spacing: 0.4px; color: var(--text-muted); margin: 20px 0 14px;">
                我的群組
            </div>
            <button type="button" class="btn-secondary" onclick="loadMyGroups()" 
                    style="width: 100%; margin-bottom: 12px;">查看我的群組</button>
            <div id="my-groups-list"></div>

            <div id="group-detail-panel" class="hidden" style="margin-top: 16px;">
                <div id="group-detail-header" 
                    style="font-size: 13px; font-weight: 600; color: var(--text-muted); 
                            margin-bottom: 10px;"></div>
                <div id="group-detail-members" style="margin-bottom: 12px;"></div>

                <div style="font-size: 12px; font-weight: 600; text-transform: uppercase; 
                            letter-spacing: 0.4px; color: var(--text-muted); margin-bottom: 8px;">
                    推薦餐廳（選擇最終餐廳）
                </div>
                <div id="group-recommend-list"></div>

                <div id="record-form-panel" class="hidden" 
                        style="margin-top: 16px; padding: 14px; 
                            background: var(--surface); border-radius: 10px; 
                            border: 1px solid var(--border);">

                    <div style="font-size: 13px; font-weight: 600; margin-bottom: 10px;">
                        建立用餐紀錄
                    </div>

                    <div id="record-selected-restaurant" 
                        style="font-size: 13px; color: var(--text-muted); margin-bottom: 10px;">
                    </div>

                    <div style="margin-bottom: 14px;">
                        <div style="font-size: 13px; font-weight: 600; margin-bottom: 6px;">
                            已選餐點
                        </div>

                        <div id="selected-dish-names"
                            style="font-size: 13px; color: var(--text-muted);">
                            先挑選餐點，這裡會顯示內容
                        </div>
                        <div id="record-total-price"
                            style="font-size: 13px; font-weight: 600; color: #e44d26; margin-top: 6px;">
                        </div>
                    </div>

                    <div style="margin-bottom: 14px;">
                        <div style="font-size: 13px; font-weight: 600; margin-bottom: 8px;">參與成員（選填）</div>
                        <div id="record-participants-list" style="display: flex; flex-wrap: wrap; gap: 8px;">
                            </div>
                    </div>

                    <div class="form-group">
                        <label>備註（選填）</label>
                        <textarea id="record-note" placeholder="備註…"></textarea>
                    </div>

                    <div class="button-group">
                        <button type="button" class="btn-primary" onclick="saveGroupRecord()">
                            儲存紀錄
                        </button>

                        <button type="button" class="btn-secondary" onclick="cancelRecord()">
                            取消
                        </button>
                    </div>
                </div>

                <div style="font-size: 12px; font-weight: 600; text-transform: uppercase; 
                            letter-spacing: 0.4px; color: var(--text-muted); 
                            margin: 20px 0 8px;">群組紀錄</div>
                <div id="group-history-list"></div>
            </div>

            <div style="font-size: 12px; font-weight: 600; text-transform: uppercase; 
                        letter-spacing: 0.4px; color: var(--text-muted); margin: 20px 0 14px;">
                加入群組
            </div>
            <form id="join-group-form">
                <div class="form-group">
                    <label>邀請碼</label>
                    <input type="text" name="inviteCode" placeholder="輸入邀請碼" required>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn-primary">加入</button>
                    <button type="button" class="btn-back" onclick="goPage('menu')">返回</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="toast" class="toast hidden"></div>

<div id="menu-modal" class="modal" style="display: none;">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal('menu-modal')">&times;</span>
    <h3>餐廳菜單</h3>
    <div id="menu-container"></div>
    <div id="menu-confirm-area"></div>
  </div>
</div>

<div id="review-modal" class="modal" style="display: none;">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal('review-modal')">&times;</span>
    <h3>餐廳評論</h3>
    <div id="review-container">
      </div>
  </div>
</div>

<div id="my-reviews-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close-btn" onclick="document.getElementById('my-reviews-modal').style.display='none'">&times;</span>
        <h3>我的評論紀錄</h3>
        <div id="my-reviews-list">
            </div>
    </div>
</div>

<div id="member-exclusions-modal" class="modal" style="display:none;">
    <div class="modal-content">
        <span class="close-btn" onclick="document.getElementById('member-exclusions-modal').style.display='none'">&times;</span>
        <h3>成員排除項目</h3>
        <div id="member-exclusions-list"></div>
    </div>
</div>

<script src="/app.js"></script>
</body>
</html>
